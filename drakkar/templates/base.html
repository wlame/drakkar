<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Drakkar Debug{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <span class="text-lg font-bold text-white">Drakkar</span>
                <a href="/" class="text-gray-300 hover:text-white text-sm">Dashboard</a>
                <a href="/partitions" class="text-gray-300 hover:text-white text-sm">Partitions</a>
                <a href="/live" class="text-gray-300 hover:text-white text-sm">Live</a>
                <a href="/history" class="text-gray-300 hover:text-white text-sm">History</a>
            </div>
            <div class="text-sm text-gray-400">
                <span class="font-mono">{{ worker_id }}</span>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    <script>
    document.addEventListener('click', function(e) {
        var el = e.target.closest('.expandable');
        if (!el) return;
        var expanding = el.classList.contains('truncate');
        el.classList.toggle('truncate');
        el.classList.toggle('max-w-xs');
        el.classList.toggle('max-w-md');
        el.classList.toggle('whitespace-pre-wrap');
        el.classList.toggle('break-all');
        // swap between truncated and full content
        var full = el.getAttribute('data-full');
        if (full) {
            if (expanding) {
                el.setAttribute('data-short', el.textContent);
                el.textContent = full;
            } else {
                el.textContent = el.getAttribute('data-short') || full;
            }
        }
    });
    </script>
</body>
</html>
