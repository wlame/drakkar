<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Drakkar Debug{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <span class="text-lg font-bold text-white">Drakkar</span>
                <a href="/" class="text-gray-300 hover:text-white text-sm">Dashboard</a>
                <a href="/partitions" class="text-gray-300 hover:text-white text-sm">Partitions</a>
                <a href="/executors" class="text-gray-300 hover:text-white text-sm">Executors</a>
                <a href="/history" class="text-gray-300 hover:text-white text-sm">History</a>
            </div>
            <div class="text-sm text-gray-400">
                <span class="font-mono">{{ worker_id }}</span>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
