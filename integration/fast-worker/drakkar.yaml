# Fast worker config — symbol counting pipeline
# Same source topic, different consumer group

worker_name_env: "WORKER_ID"
cluster_name: "fast cluster"

kafka:
  brokers: "kafka:9092"
  source_topic: "search-requests"
  consumer_group: "drakkar-fast"
  max_poll_records: 50
  max_poll_interval_ms: 300000
  session_timeout_ms: 45000
  heartbeat_interval_ms: 3000

executor:
  binary_path: "/usr/local/bin/count-symbols"
  max_executors: 2
  task_timeout_seconds: 30
  window_size: 10
  max_retries: 1
  drain_timeout_seconds: 5
  backpressure_high_multiplier: 32
  backpressure_low_multiplier: 4

sinks:
  # --- Kafka sink instances ---
  #
  # Two separate Kafka output streams.
  #
  # NAMING NOTE: the labels "per_message_counts" and "window_summaries"
  # below are USER-CHOSEN instance names — they are NOT Drakkar keywords.
  # You could rename them to anything (e.g. "foo", "bar"); the handler
  # would just need to reference the new name via `KafkaPayload(sink=...)`.
  #
  # The reserved/framework keywords on this tree are only:
  #   - "sinks"        (top-level section marker)
  #   - "kafka"        (sink type — one of kafka/postgres/mongo/...)
  #   - "topic"        (field within a kafka sink instance)
  #   - "brokers"      (field within a kafka sink instance)
  #   - "ui_url"       (field within a kafka sink instance)
  #
  # Everything at "sinks.kafka.<your-name-here>" is user-chosen.
  kafka:
    per_message_counts:
      # Written to by collect(): one record per input message, fine-grained.
      topic: "symbol-counts"
      ui_url: "http://localhost:8088"
    window_summaries:
      # Written to by on_window_complete(): one record per completed
      # arrange() window, aggregated statistics. Lower rate, wider per
      # record. Useful for dashboards or downstream batch jobs that don't
      # need per-file detail.
      topic: "symbol-count-windows"
      ui_url: "http://localhost:8088"

dlq:
  topic: ""  # auto-derived: search-requests_dlq

metrics:
  enabled: true
  port: 9090

logging:
  level: "INFO"
  format: "json"

debug:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  db_dir: "/shared"
  store_events: true
  store_config: true
  store_state: true
  state_sync_interval_seconds: 10
  expose_env_vars:
    - "WORKER_ID"
    - "DRAKKAR_CONFIG"
  retention_hours: 24
  retention_max_events: 100000
  store_output: true
  flush_interval_seconds: 3
  max_buffer: 50000
  max_ui_rows: 5000
  # Duration thresholds — tuned down for fast tasks (most finish in <100ms)
  log_min_duration_ms: 100       # log slow tasks above 100ms
  ws_min_duration_ms: 100        # stream all but the fastest to live UI
  event_min_duration_ms: 0       # write all task events to DB
  output_min_duration_ms: 100    # only store stdout/stderr/args for tasks above 100ms
  prometheus_url: "http://localhost:9099"
  prometheus_rate_interval: "30s"
  prometheus_worker_label: 'instance="{worker_id}:{metrics_port}"'
  prometheus_cluster_label: 'cluster="fast-cluster"'
  custom_links:
    - name: "Drakkar GitHub"
      url: "https://github.com/wlame/drakkar?from={worker_id}"
