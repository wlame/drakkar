# Drakkar integration test configuration
# All values can be overridden with env vars: DK_KAFKA__BROKERS, etc.

worker_name_env: "WORKER_ID"
cluster_name: "main cluster"

kafka:
  brokers: "kafka:9092"
  source_topic: "search-requests"
  consumer_group: "drakkar-integration"
  max_poll_records: 50
  max_poll_interval_ms: 300000
  session_timeout_ms: 10000
  heartbeat_interval_ms: 2000
  # Kafka-UI deep-link config. The Debug UI renders a small Kafka icon
  # next to every <partition:offset> link; clicking it opens Kafka-UI
  # pre-filtered on (source_topic, partition, offset) in a new tab. Both
  # ui_url and ui_cluster_name must be set for the icon to appear; the
  # cluster_name must match the value Kafka-UI is itself configured with
  # (see docker-compose: KAFKA_CLUSTERS_0_NAME=drakkar-local).
  ui_url: "http://localhost:8088"
  ui_cluster_name: "drakkar-local"

executor:
  binary_path: "/usr/local/bin/run-rg"
  env:
    RG_COLORS: "never"              # config-level env var: passed to all ripgrep tasks
    SEARCH_CORPUS: "/tmp/search-corpus"
  max_executors: 4
  task_timeout_seconds: 120
  window_size: 10
  max_retries: 3
  drain_timeout_seconds: 5
  backpressure_high_multiplier: 32
  backpressure_low_multiplier: 4

# --- Sinks ---
#
# A NOTE ON NAMING in this section:
#
# Drakkar splits every sink entry into three parts:
#
#     sinks.<SINK_TYPE>.<INSTANCE_NAME>:
#         <field>: <value>
#         ...
#
#   - <SINK_TYPE> is a Drakkar KEYWORD and must be one of:
#         kafka, postgres, mongo, redis, http, filesystem
#   - <INSTANCE_NAME> is a USER-CHOSEN label — pick anything you like.
#     The handler code refers to it via `Payload(sink="<INSTANCE_NAME>")`
#     when multiple instances of the same sink type exist.
#   - The inner field names ("topic", "dsn", "uri", "url", "ui_url",
#     "brokers", "pool_min", "pool_max", etc.) ARE Drakkar keywords
#     and are schema-validated by pydantic.
#
# Below, "results", "priority_match_notifications",
# "archive_results_db", "hot_recent_matches_db", "archive",
# "hot_match_cache", "webhook", and "logs" are all user-chosen instance
# labels — nothing special about the names themselves.
#
# NOTE on "hot_match_cache" vs the top-level `cache:` section further
# down: the redis instance below is a SINK (external Redis server where
# the handler pushes per-task summaries, unrelated to the framework's
# in-process cache). The top-level `cache:` block configures the
# framework's own key/value cache (memory + per-worker SQLite + peer
# sync) that handlers access via `self.cache.<method>(...)`. The two
# features happen to share the "cache" word and nothing else — this
# file uses the verbose name `hot_match_cache` so it's obvious they're
# distinct.
sinks:
  kafka:
    # Default output — every search result. Referenced as sink="results".
    results:
      topic: "search-results"
      # brokers inherited from kafka.brokers
      ui_url: "http://localhost:8088"
    # Lower-volume side-channel for the subset of high-match results that
    # also trigger the HTTP webhook. A separate topic so downstream
    # consumers interested only in alerts can subscribe without reading
    # the full result stream.
    priority_match_notifications:
      topic: "search-results-priority"
      ui_url: "http://localhost:8088"

  postgres:
    # The long-term archive — every search result lands here. Larger pool
    # because writes are frequent. Points at the "postgres" service.
    archive_results_db:
      dsn: "postgresql://drakkar:drakkar@postgres:5432/drakkar"
      pool_min: 1
      pool_max: 5
    # A second Postgres INSTANCE, pointing at a SEPARATE database server
    # ("postgres-hot" in docker-compose.yml, DB "drakkar_hot"). Only
    # high-match results are routed here — the handler decides which
    # instance to target by setting `sink="hot_recent_matches_db"` on
    # the PostgresPayload. Small pool: this mirrors a real deployment
    # where a hot/interactive DB has tighter resource limits than the
    # archive.
    hot_recent_matches_db:
      dsn: "postgresql://drakkar:drakkar@postgres-hot:5432/drakkar_hot"
      pool_min: 1
      pool_max: 2

  mongo:
    archive:
      uri: "mongodb://mongo:27017"
      database: "drakkar"
      ui_url: "http://localhost:8089"

  redis:
    # External Redis sink for per-task summaries (1h TTL) — this is
    # a downstream cache consumed by other services, NOT the framework's
    # in-process cache. Verbose instance name makes it clear at a
    # glance that this is "the redis-backed per-task hot match cache",
    # distinct from the framework cache configured under `cache:` below.
    hot_match_cache:
      url: "redis://redis:6379/0"
      key_prefix: "drakkar:"
      ui_url: "http://localhost:8087"

  http:
    webhook:
      url: "http://webhook:8080/"
      method: "POST"
      timeout_seconds: 10
      max_retries: 2

  filesystem:
    logs:
      base_path: "/tmp"

dlq:
  topic: ""  # auto-derived: search-requests_dlq

metrics:
  enabled: true
  port: 9090

logging:
  level: "INFO"
  format: "json"

debug:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  db_dir: "/shared"
  store_events: true
  store_config: true
  store_state: true
  state_sync_interval_seconds: 10
  expose_env_vars:
    - "WORKER_ID"
    - "DK_CONFIG"
  retention_hours: 24
  retention_max_events: 100000
  store_output: true
  flush_interval_seconds: 3
  max_buffer: 50000
  max_ui_rows: 5000
  prometheus_url: "http://localhost:9099"
  prometheus_rate_interval: "30s"
  prometheus_worker_label: 'instance="{worker_id}:{metrics_port}"'
  prometheus_cluster_label: 'cluster="main-cluster"'
  custom_links:
    - name: "Drakkar GitHub"
      url: "https://github.com/wlame/drakkar?from={worker_id}"

# --- Framework cache ---
#
# The handler-facing key/value cache surfaced as `self.cache` on every
# handler. Backed by an in-memory dict for hot reads and a per-worker
# SQLite file (`<WORKER_ID>-cache.db`) for durability across restarts,
# with a periodic peer-sync loop that pulls from other workers'
# cache DBs for cross-worker visibility.
#
# This is completely separate from the `sinks.redis.hot_match_cache`
# instance above — that is an *external* Redis service used by
# downstream consumers; this section configures the framework's
# *in-process* cache which the handler consults inside arrange() and
# populates inside on_task_complete().
cache:
  # Master switch. When false, every handler.cache call becomes a no-op
  # stub (peek/get return None, set/delete silently discard) — handler
  # code runs unchanged.
  enabled: true
  # Empty db_dir falls back to debug.db_dir above. Keeping them on the
  # same shared volume lets the peer-sync loop discover other workers'
  # cache DBs alongside their -live.db recorder files.
  db_dir: ""
  # Memory → SQLite flush cadence. Shorter = less data lost on a crash;
  # longer = fewer SQLite transactions per worker. 3s matches the
  # recorder's own flush interval for operational consistency.
  flush_interval_seconds: 3.0
  # Expired-row removal cadence. 60s is fine — TTLs are checked inline
  # on every read, so expired rows are invisible to handlers even
  # between cleanup cycles; this loop only reclaims disk space.
  cleanup_interval_seconds: 60.0
  # Bound the in-memory dict with LRU eviction. The SQLite file is the
  # source of truth, so evictions don't lose data — a subsequent get()
  # on an evicted key falls through to the DB. Leave unset for
  # unbounded growth (fine for small workers; set a cap in production).
  max_memory_entries: 10000
  # Peer-sync loop: pulls recent rows from other workers' `-cache.db`
  # files via read-only SQLite connections, LWW-merges into our local
  # DB, and invalidates overlapping memory entries so the next read
  # sees the newer value. Requires debug.store_config=true above so
  # peers can discover our cluster_name.
  peer_sync:
    enabled: true
    interval_seconds: 30.0
    batch_size: 500
    timeout_seconds: 5.0
