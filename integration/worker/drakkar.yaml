# Drakkar integration test configuration
# All values can be overridden with env vars: DRAKKAR_KAFKA__BROKERS, etc.

worker_name_env: "WORKER_ID"
cluster_name: "main cluster"

kafka:
  brokers: "kafka:9092"
  source_topic: "search-requests"
  consumer_group: "drakkar-integration"
  max_poll_records: 50
  max_poll_interval_ms: 300000
  session_timeout_ms: 10000
  heartbeat_interval_ms: 2000

executor:
  binary_path: "/usr/local/bin/run-rg"
  env:
    RG_COLORS: "never"              # config-level env var: passed to all ripgrep tasks
    SEARCH_CORPUS: "/tmp/search-corpus"
  max_executors: 4
  task_timeout_seconds: 120
  window_size: 10
  max_retries: 3
  drain_timeout_seconds: 5
  backpressure_high_multiplier: 32
  backpressure_low_multiplier: 4

# --- Sinks ---
#
# A NOTE ON NAMING in this section:
#
# Drakkar splits every sink entry into three parts:
#
#     sinks.<SINK_TYPE>.<INSTANCE_NAME>:
#         <field>: <value>
#         ...
#
#   - <SINK_TYPE> is a Drakkar KEYWORD and must be one of:
#         kafka, postgres, mongo, redis, http, filesystem
#   - <INSTANCE_NAME> is a USER-CHOSEN label — pick anything you like.
#     The handler code refers to it via `Payload(sink="<INSTANCE_NAME>")`
#     when multiple instances of the same sink type exist.
#   - The inner field names ("topic", "dsn", "uri", "url", "ui_url",
#     "brokers", "pool_min", "pool_max", etc.) ARE Drakkar keywords
#     and are schema-validated by pydantic.
#
# Below, "results", "priority_match_notifications",
# "archive_results_db", "hot_recent_matches_db", "archive", "cache",
# "webhook", and "logs" are all user-chosen instance labels — nothing
# special about the names themselves.
sinks:
  kafka:
    # Default output — every search result. Referenced as sink="results".
    results:
      topic: "search-results"
      # brokers inherited from kafka.brokers
      ui_url: "http://localhost:8088"
    # Lower-volume side-channel for the subset of high-match results that
    # also trigger the HTTP webhook. A separate topic so downstream
    # consumers interested only in alerts can subscribe without reading
    # the full result stream.
    priority_match_notifications:
      topic: "search-results-priority"
      ui_url: "http://localhost:8088"

  postgres:
    # The long-term archive — every search result lands here. Larger pool
    # because writes are frequent. Points at the "postgres" service.
    archive_results_db:
      dsn: "postgresql://drakkar:drakkar@postgres:5432/drakkar"
      pool_min: 1
      pool_max: 5
    # A second Postgres INSTANCE, pointing at a SEPARATE database server
    # ("postgres-hot" in docker-compose.yml, DB "drakkar_hot"). Only
    # high-match results are routed here — the handler decides which
    # instance to target by setting `sink="hot_recent_matches_db"` on
    # the PostgresPayload. Small pool: this mirrors a real deployment
    # where a hot/interactive DB has tighter resource limits than the
    # archive.
    hot_recent_matches_db:
      dsn: "postgresql://drakkar:drakkar@postgres-hot:5432/drakkar_hot"
      pool_min: 1
      pool_max: 2

  mongo:
    archive:
      uri: "mongodb://mongo:27017"
      database: "drakkar"
      ui_url: "http://localhost:8089"

  redis:
    cache:
      url: "redis://redis:6379/0"
      key_prefix: "drakkar:"
      ui_url: "http://localhost:8087"

  http:
    webhook:
      url: "http://webhook:8080/"
      method: "POST"
      timeout_seconds: 10
      max_retries: 2

  filesystem:
    logs:
      base_path: "/tmp"

dlq:
  topic: ""  # auto-derived: search-requests_dlq

metrics:
  enabled: true
  port: 9090

logging:
  level: "INFO"
  format: "json"

debug:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  db_dir: "/shared"
  store_events: true
  store_config: true
  store_state: true
  state_sync_interval_seconds: 10
  expose_env_vars:
    - "WORKER_ID"
    - "DRAKKAR_CONFIG"
  retention_hours: 24
  retention_max_events: 100000
  store_output: true
  flush_interval_seconds: 3
  max_buffer: 50000
  max_ui_rows: 5000
  prometheus_url: "http://localhost:9099"
  prometheus_rate_interval: "30s"
  prometheus_worker_label: 'instance="{worker_id}:{metrics_port}"'
  prometheus_cluster_label: 'cluster="main-cluster"'
  custom_links:
    - name: "Drakkar GitHub"
      url: "https://github.com/wlame/drakkar?from={worker_id}"
