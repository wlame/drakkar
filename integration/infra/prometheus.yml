global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: drakkar-main
    static_configs:
      - targets:
          - worker-1:9090
          - worker-2:9091
          - worker-3:9093
        labels:
          cluster: main-cluster

  - job_name: drakkar-fast
    static_configs:
      - targets:
          - fast-worker-1:9094
          - fast-worker-2:9095
        labels:
          cluster: fast-cluster
